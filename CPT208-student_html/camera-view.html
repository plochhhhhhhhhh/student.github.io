<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Camera View · AR Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 手机外背景恢复浅色 */
        body {
            background: #EFF3F8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
        }

        /* 手机外框 — 与 map.html 保持一致 */
        .phone-mock {
            width: 375px;
            height: 700px;
            background: #000000;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 8px #2C2F36, 0 0 0 12px #1A1C21;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部黑色摄像头区域 */
        .camera-bar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 34px;
            background: #0F0F10;
            border-radius: 28px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }
        .camera-bar::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            opacity: 0.9;
            margin-right: 4px;
        }
        .camera-bar::after {
            content: "";
            width: 22px;
            height: 8px;
            background: #2E2F33;
            border-radius: 12px;
            margin-left: 4px;
        }

        /* 手机内背景：占位图片（模拟相机视图） */
        .camera-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('walking-to-SD.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.85);
            z-index: 0;
        }

        /* 内容层 */
        .app-content {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 20px 30px;
        }

        /* 顶部进度条区域 */
        .progress-section {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 10px 20px;
            width: fit-content;
            margin-bottom: 8px;
        }
        .progress-label {
            font-size: 28px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }
        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            height: 8px;
            width: 180px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-fill {
            width: 30%;
            height: 100%;
            background: #4CAF50;
            border-radius: 20px;
        }

        /* 中间动画区域（对话框 + 鸟 + 箭头），整体上移 */
        .animation-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: -30px;   /* 进一步上移，保持在进度条下方 */
            margin-bottom: 10px;
        }

        /* 对话框 + 鸟的容器 */
        .bird-bubble {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 8px;
        }
        .speech-bubble {
            background: white;
            border-radius: 32px;
            padding: 10px 20px;
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-weight: 700;
            font-size: 17px;
            color: #1E2F3F;
            white-space: nowrap;
            margin-bottom: 16px;
        }
        /* 对话框尖端指向下方的小红鸟 */
        .speech-bubble::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        /* 小红鸟 */
        .red-bird {
            font-size: 68px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
            animation: subtleFly 2s infinite ease-in-out;
            color: #E34234;
            margin-top: 0;
        }
        @keyframes subtleFly {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }

        /* AR 导航宽 V 形无柄箭头 */
        .arrows-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
        }
        .nav-arrow {
            color: #00A8FF;
            font-size: 36px;
            font-weight: bold;
            filter: drop-shadow(0 0 6px #00A8FF);
            animation: pulseUp 1.5s infinite ease-in-out;
            line-height: 1;
        }
        .nav-arrow i {
            transform: scaleX(1.4);
            display: inline-block;
        }
        @keyframes pulseUp {
            0% { transform: translateY(0) scale(1); opacity: 0.7; text-shadow: 0 0 0 #00A8FF; }
            50% { transform: translateY(-8px) scale(1.1); opacity: 1; text-shadow: 0 0 12px #00A8FF; }
            100% { transform: translateY(0) scale(1); opacity: 0.7; text-shadow: 0 0 0 #00A8FF; }
        }

        /* 底部卡片 — 文字居中 */
        .info-card {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 18px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .building-title {
            font-size: 20px;
            font-weight: 800;
            color: white;
            margin-bottom: 6px;
        }
        .building-distance {
            font-size: 14px;
            color: #CCD6F0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .distance-icon {
            font-size: 14px;
            color: #4CAF50;
        }

        /* 返回按钮 — 与摄像头黑条 Y 轴居中对齐 */
        .back-button {
            position: absolute;
            top: 14px;   /* 摄像头黑条 top=12px, 高度34px，中心 y=29px；按钮高约30px，top=14px 时中心约29px */
            left: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 6px 14px;
            color: white;
            font-size: 13px;
            text-decoration: none;
            z-index: 30;
            backdrop-filter: blur(4px);
        }
        .back-button:active {
            opacity: 0.7;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="phone-mock">
    <div class="camera-bar"></div>
    <div class="camera-bg"></div>
    
    <a href="map.html" class="back-button"><i class="fas fa-arrow-left"></i> Back</a>

    <div class="app-content">
        <!-- 进度条 -->
        <div class="progress-section">
            <div class="progress-label">30%</div>
            <div class="progress-bar-bg">
                <div class="progress-fill"></div>
            </div>
        </div>

        <!-- 动画区域：对话框、鸟、箭头整体上移 -->
        <div class="animation-area">
            <div class="bird-bubble">
                <div class="speech-bubble">
                    Welcome to Science Building D!
                </div>
                <i class="fas fa-dove red-bird"></i>
            </div>
            <div class="arrows-container">
                <div class="nav-arrow"><i class="fas fa-chevron-up"></i></div>
                <div class="nav-arrow"><i class="fas fa-chevron-up"></i></div>
                <div class="nav-arrow"><i class="fas fa-chevron-up"></i></div>
            </div>
        </div>

        <!-- 底部信息卡片 -->
        <div class="info-card">
            <div class="building-title">Science Building D</div>
            <div class="building-distance">
                <i class="fas fa-location-dot distance-icon"></i>
                50m away • 1 min walk
            </div>
        </div>
    </div>
</div>
</body>
</html>
