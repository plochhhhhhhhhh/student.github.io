<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>校园探索 · 发现精彩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #EFF3F8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 20px;
        }

        /* 手机外框 — 尺寸与 dashboard.html 完全一致 */
        .phone-mock {
            width: 375px;
            height: 700px;
            background: #FFFFFF;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 8px #2C2F36, 0 0 0 12px #1A1C21;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部黑色摄像头区域 (黑条) — 位置/样式完全保留 */
        .camera-bar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 34px;
            background: #0F0F10;
            border-radius: 28px;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }
        .camera-bar::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
            opacity: 0.9;
            margin-right: 4px;
        }
        .camera-bar::after {
            content: "";
            width: 22px;
            height: 8px;
            background: #2E2F33;
            border-radius: 12px;
            margin-left: 4px;
        }

        /* 可滚动内容区，避开摄像头区域和底部导航栏 */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 60px 20px 16px;
            scrollbar-width: thin;
        }
        .app-content::-webkit-scrollbar {
            width: 3px;
        }

        /* Discover 头部 */
        .discover-header {
            margin-bottom: 8px;
        }
        .discover-title {
            font-size: 32px;
            font-weight: 800;
            color: #1E2F3F;
            letter-spacing: -0.5px;
        }
        .discover-sub {
            font-size: 15px;
            font-weight: 500;
            color: #7E8C9E;
            margin-top: 4px;
            border-left: 3px solid #2C5F9A;
            padding-left: 12px;
        }

        /* 分隔线 */
        .divider {
            margin: 16px 0 20px;
            height: 1px;
            background: #EFF2F8;
        }

        /* FEATURED 区域 */
        .featured-section {
            margin-bottom: 28px;
        }
        .section-badge {
            font-size: 13px;
            font-weight: 700;
            color: #2C5F9A;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: inline-block;
        }
        .featured-card {
            background: #F8FAFE;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid #EEF2F9;
            transition: transform 0.1s ease, box-shadow 0.2s;
            cursor: pointer;
        }
        .featured-card:active {
            transform: scale(0.98);
        }
        .featured-image {
            width: 100%;
            height: 160px;
            background-color: #D9E2EF;
            background-image: url('design-building-exhibition.jpg');
            background-size: cover;
            background-position: center;
        }
        .featured-info {
            padding: 16px;
        }
        .featured-title {
            font-size: 18px;
            font-weight: 700;
            color: #1E2F3F;
            margin-bottom: 6px;
        }
        .featured-meta {
            font-size: 13px;
            color: #8C9AB0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .featured-stats {
            background: #EEF3FC;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            color: #2C5F9A;
        }

        /* Recent Updates 区域 */
        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
        }
        .recent-title {
            font-size: 20px;
            font-weight: 700;
            color: #1E2F3F;
        }
        .recent-link {
            font-size: 12px;
            color: #2C5F9A;
            font-weight: 500;
            cursor: pointer;
        }
        .recent-link:active {
            opacity: 0.6;
        }

        /* 新闻列表项 */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .news-item {
            display: flex;
            gap: 14px;
            border-bottom: 1px solid #F0F3F8;
            padding-bottom: 16px;
            cursor: pointer;
            transition: opacity 0.1s;
        }
        .news-item:active {
            opacity: 0.7;
        }
        .news-thumb {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background-color: #E6EDF6;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        .news-content {
            flex: 1;
        }
        .news-category {
            font-size: 12px;
            font-weight: 700;
            color: #2C5F9A;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .news-headline {
            font-size: 15px;
            font-weight: 600;
            color: #1F2F44;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .news-date {
            font-size: 11px;
            color: #9AABBF;
            margin-bottom: 10px;
        }
        .news-actions {
            display: flex;
            gap: 16px;
        }
        .action-btn {
            background: transparent;
            border: none;
            font-size: 12px;
            font-weight: 500;
            color: #6C7F9E;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 4px 0;
            transition: color 0.1s;
        }
        .action-btn:active {
            color: #1C4E80;
        }

        /* 底部导航栏 — 完全复刻 dashboard.html */
        .bottom-nav {
            background: #FFFFFF;
            border-top: 1px solid #F0F2F6;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 20px 18px;
            width: 100%;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: opacity 0.1s ease;
            background: transparent;
            border: none;
            font-family: inherit;
            padding: 4px 0;
        }
        .nav-item:active {
            opacity: 0.6;
            transform: scale(0.96);
        }
        .nav-icon {
            font-size: 22px;
            margin-bottom: 2px;
        }
        .nav-label {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }
        /* 默认非激活状态颜色 */
        .nav-item .nav-icon,
        .nav-item .nav-label {
            color: #8E9AAE;
        }
        /* 激活状态（当前页面）颜色为蓝色 */
        .nav-item-active .nav-icon,
        .nav-item-active .nav-label {
            color: #2C5F9A;
        }
        /* 悬停时所有项都变为蓝色 */
        .nav-item:hover .nav-icon,
        .nav-item:hover .nav-label {
            color: #2C5F9A;
        }
    </style>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="phone-mock">
    <!-- 黑色摄像头区域 (黑条) -->
    <div class="camera-bar"></div>

    <!-- 滚动内容区 -->
    <div class="app-content">
        <!-- Discover 头部 -->
        <div class="discover-header">
            <div class="discover-title">Explore</div>
            <div class="discover-sub">Campus life & highlights</div>
        </div>

        <div class="divider"></div>

        <!-- FEATURED 板块 -->
        <div class="featured-section">
            <div class="section-badge">FEATURED</div>
            <div class="featured-card">
                <div class="featured-image" 
                     style="background-image: url('design-building-exhibition.jpg'); background-size: cover; background-position: center;">
                </div>
                <div class="featured-info">
                    <div class="featured-title">Design Building Exhibition</div>
                    <div class="featured-meta">
                        <span><i class="far fa-calendar-alt"></i> Apr 21, 2026</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Updates 区域 -->
        <div class="recent-header">
            <div class="recent-title">Recent Updates</div>
        </div>

        <div class="news-list">
            <!-- 新闻条目 1: CAREER -->
            <div class="news-item">
                <div class="news-thumb" style="background-image: url('graduate-2025-report.jpg'); background-size: cover;"></div>
                <div class="news-content">
                    <div class="news-category"><i class="fas fa-briefcase"></i> CAREER</div>
                    <div class="news-headline">Graduate Employment Report 2025 Released</div>
                    <div class="news-date">Apr 20, 2026</div>
                </div>
            </div>

            <!-- 新闻条目 2: ACADEMICS -->
            <div class="news-item">
                <div class="news-thumb" style="background-image: url('AI-research-center.jpg'); background-size: cover;"></div>
                <div class="news-content">
                    <div class="news-category"><i class="fas fa-microscope"></i> ACADEMICS</div>
                    <div class="news-headline">New Teaching Building Opens</div>
                    <div class="news-date">Apr 19, 2026</div>
                </div>
            </div>

            <!-- 新闻条目 3: COMMUNITY -->
            <div class="news-item">
                <div class="news-thumb" style="background-image: url('autumn-festival.jpg'); background-size: cover;"></div>
                <div class="news-content">
                    <div class="news-category"><i class="fas fa-leaf"></i> COMMUNITY</div>
                    <div class="news-headline">Campus Life: Autumn Festival Highlights</div>
                    <div class="news-date">Apr 18, 2026</div>
                </div>
            </div>
        </div>

    </div>

    <!-- 底部导航栏 — Explore 项高亮为蓝色（当前页面） -->
    <div class="bottom-nav">
        <div class="nav-item nav-item-other" id="navMap">
            <i class="fas fa-map-marker-alt nav-icon"></i>
            <span class="nav-label">Map</span>
        </div>
        <div class="nav-item nav-item-active" id="navExplore">
            <i class="fas fa-compass nav-icon"></i>
            <span class="nav-label">Explore</span>
        </div>
        <div class="nav-item nav-item-other" id="navProfile">
            <i class="fas fa-user-circle nav-icon"></i>
            <span class="nav-label">Profile</span>
        </div>
    </div>
</div>

<script>
    // 纯演示交互：底部导航按钮点击仅提供视觉反馈，不进行实际跳转
    const mapBtn = document.getElementById('navMap');
    const exploreBtn = document.getElementById('navExplore');
    const profileBtn = document.getElementById('navProfile');
    
    function handleNavClick(name) {
        console.log(`演示点击: ${name}`);
        // 如需实际跳转可在此处添加，但根据要求仅演示，无真实功能
    }
    
    // 为底部导航按钮添加跳转逻辑
    mapBtn.addEventListener('click', () => {
        window.location.href = 'map.html';
    });
    exploreBtn.addEventListener('click', () => {
        window.location.href = 'explore.html';
    });
    profileBtn.addEventListener('click', () => {
        window.location.href = 'profile.html';
    });

    // ==================== 新增：为活动内容和新闻列表项添加外部链接跳转 ====================
    // 1. 为 FEATURED 内容 "Design Building Exhibition" 添加点击跳转
    const featuredCard = document.querySelector('.featured-card');
    if (featuredCard) {
        featuredCard.addEventListener('click', (e) => {
            // 阻止冒泡，避免冲突
            e.stopPropagation();
            window.open('https://mp.weixin.qq.com/s/P4AWhZuziV7EPi5Ow8anRg', '_blank');
        });
    }

    // 2. 为三个新闻条目添加点击跳转
    const newsItems = document.querySelectorAll('.news-item');
    // 定义跳转链接数组，顺序与 .news-item 列表顺序一致
    const newsLinks = [
        'https://mp.weixin.qq.com/s/z-LHW7ZgUkKdGyxsBfRmug', // Graduate Employment Report 2025 Released
        'https://mp.weixin.qq.com/s/B2WxYnSrKU-FMpUgGC63ew', // New Teaching Building Opens
        'https://mp.weixin.qq.com/s/pLQAuulpAR-UrkH9Lj9Byw'  // Campus Life: Autumn Festival Highlights
    ];

    if (newsItems && newsItems.length === newsLinks.length) {
        newsItems.forEach((item, index) => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                window.open(newsLinks[index], '_blank');
            });
        });
    }
    // ==================== 外部链接跳转功能添加完毕 ====================

    // 保留原有的内容区交互（仅演示，无真实功能）
    const allInteractive = document.querySelectorAll('.featured-card, .news-item, .action-btn, .recent-link');
    allInteractive.forEach(el => {
        // 避免重复添加和覆盖上面的点击事件处理程序
        if (!el.classList.contains('featured-card') && !el.classList.contains('news-item')) {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                console.log('演示点击: 无实际功能');
            });
        } else {
            // 对于 featured-card 和 news-item，我们的新处理程序已经添加，不再重复处理
            // 原有 console 日志可以保留或移除
        }
    });
</script>
</body>
</html>
